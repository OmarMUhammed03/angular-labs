<section class="product-list" id="products" aria-labelledby="products-heading">
  <div class="product-list__header">
    <h2 id="products-heading" class="product-list__title">Featured Products</h2>
    @if (!isLoading()) {
      <p class="product-list__subtitle">{{ products().length }} items available</p>
    }
  </div>

  @if (isLoading()) {
    <div class="skeleton-grid" role="status" aria-label="Loading products">
      @for (n of [1,2,3,4,5,6,7,8]; track n) {
        <div class="skeleton-card" aria-hidden="true">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line wide"></div>
            <div class="skeleton-line narrow"></div>
            <div class="skeleton-line medium"></div>
          </div>
        </div>
      }
    </div>
  } @else {
    <ul class="product-list__grid" role="list" aria-label="Products">
      @for (product of products(); track product.id) {
        <li role="listitem">
          <app-product-card
            [product]="product"
            [inCart]="inCartIds().has(product.id)"
            [justAdded]="lastAdded() === product.id"
            (addToCart)="onAddToCart($event)"
          />
        </li>
      }
    </ul>
  }
</section>
